name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-regression-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential clang

      - name: Select compiler
        run: echo "CC=${{ matrix.compiler }}" >> $GITHUB_ENV

      - name: Build with make
        run: make

      - name: Build with direct gcc command
        run: $CC -O2 -Wall -Wextra -std=c11 -o library_direct main.c interface.c management.c book_management.c user_management.c globals.c

      - name: Run smoke test
        run: |
          ./library books.txt user.txt loan.txt << 'EOF'
          5
          EOF

      - name: Run regression tests
        run: bash tests/run_regression.sh
