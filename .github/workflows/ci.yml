name: C CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build with make
        run: make

      - name: Smoke test run
        run: |
          ./library books.txt user.txt loan.txt << 'EOF'
          5
          EOF

      - name: Build with direct gcc command
        run: gcc -O2 -Wall -Wextra -std=c11 -o library_direct main.c interface.c management.c book_management.c user_management.c
