name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-regression-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential clang

      - name: Select compiler
        run: echo "CC=${{ matrix.compiler }}" >> $GITHUB_ENV

      - name: Build with make
        run: make

      - name: Build with direct gcc command
        run: $CC -O2 -Wall -Wextra -std=c11 -o library_direct main.c interface.c management.c book_management.c user_management.c globals.c

      - name: Run smoke test
        run: |
          ./library books.txt user.txt loan.txt << 'EOF'
          5
          EOF

      - name: Run regression tests
        run: bash tests/run_regression.sh | tee regression.log

      - name: Upload regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-log-${{ matrix.compiler }}
          path: regression.log

  windows-regression:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Build (Windows MinGW)
        shell: pwsh
        run: |
          $env:Path = "C:\\msys64\\mingw64\\bin;" + $env:Path
          mingw32-make clean
          mingw32-make

      - name: Run regression (PowerShell)
        shell: pwsh
        run: |
          $env:Path = "C:\\msys64\\mingw64\\bin;" + $env:Path
          powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File tests\run_regression.ps1 | Tee-Object -FilePath regression-windows.log

      - name: Upload Windows regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-log-windows
          path: regression-windows.log
