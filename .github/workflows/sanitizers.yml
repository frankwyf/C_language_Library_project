name: Sanitizers

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build with sanitizers
        run: |
          gcc -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -std=c11 \
            -o library_san main.c interface.c management.c book_management.c user_management.c globals.c

      - name: Smoke run with sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          set -o pipefail
          printf "5\n" | ./library_san books.txt user.txt loan.txt 2>&1 | tee sanitizer-smoke.log

      - name: Regression run with sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          set -o pipefail
          cp library_san library
          bash tests/run_regression.sh 2>&1 | tee sanitizer-regression.log

      - name: Upload sanitizer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-logs
          path: |
            sanitizer-smoke.log
            sanitizer-regression.log
