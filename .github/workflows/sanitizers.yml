name: Sanitizers

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build with sanitizers
        run: |
          gcc -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -std=c11 \
            -o library_san main.c interface.c management.c book_management.c user_management.c globals.c

      - name: Smoke run with sanitizers
        run: |
          ./library_san books.txt user.txt loan.txt << 'EOF'
          5
          EOF

      - name: Regression run with sanitizers
        run: |
          cp library_san library
          bash tests/run_regression.sh
