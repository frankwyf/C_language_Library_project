name: Bug report
description: Report a reproducible bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps and input to reproduce the issue.
      placeholder: |
        1. Build with ...
        2. Run command ...
        3. Enter input ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, Ubuntu 24.04

  - type: input
    id: compiler
    attributes:
      label: Compiler and version
      placeholder: e.g. gcc 13.2.0
